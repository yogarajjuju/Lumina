server:
  port: 8090

spring:
  application:
    name: ecommerce-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ecommercedb}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DB_DDL:create-drop}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "b3BlbnNlc2FtZXNlY3JldGtleWZvcmp3dHRva2VuZ2VuZXJhdGlvbjEyMzQ1Njc4OTBhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5eg=="
    expiration-ms: 86400000

logging:
  level:
    com.shop.ecommerce: INFO
    org.springframework.security: WARN
